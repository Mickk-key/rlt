# Plug insertion — robot PC (actor_loop). GPU rl_server uses configs/plug_insertion_gpu.yaml.

robot:
  backend: deoxys
  deoxys_root: third_party/deoxys
  deoxys_config: config/charmander.yml
  control_hz: 20
  action_scale: [0.05, 0.02, 1.0]
  proprio_dim: 8
  language: "plug the charger into the power socket"

gripper:
  type: franka
  config: configs/franka/franka_hand.yaml

cameras:
  backend: deoxys_realsense
  mapping:
    wrist: "215222079599"
    external: "254322072381"
  width: 640
  height: 480
  fps: 30
  image_size: [224, 224]

vla:
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  max_steps_per_episode: 200
  max_episodes: 50
  reset_mode: workspace
  post_reset_wait_sec: 0.2
  use_workspace_reset: true
  # GPU/VLA reference actions are physical EE deltas (m) — same as NPZ, not spacemouse units.
  action_is_physical: true

gpu_server:
  mock: false
  host: "10.176.53.120"
  port: 8765
  # First openpi VLA infer can be slow (CUDA warmup); default client wait is 180s.
  infer_timeout_sec: 180

# Same init-cube reset as SFT collection (configs/sft_plug_insertion.yaml).
sft_collection:
  fps: 50
  reset_pos_tol_m: 0.015
  joint_home_if_delta_above_m: 0.35
  approach_xy_first: true
  workspace_randomization:
    enabled: true
    bottom_center_xyz:
      - 0.6487597823143005
      - 0.008056552149355412
      - 0.20196470618247986
    reference_quat:
      - 0.014823771081864834
      - 0.9990329742431641
      - 0.013332861475646496
      - -0.03918664902448654
    gripper_width: 0.08
    xy_half_range_m: 0.05
    z_range_m: 0.0
    seed: null

data_collection:
  fps: 20
  phase: critical
  controller_type: OSC_POSE
  controller_cfg: configs/deoxys/osc-pose-controller.yml
  gripper_latch: true
  spacemouse_vendor_id: 9583
  spacemouse_product_id: 50746
  reset_joint_positions:
    - 0.05904578
    - 0.52446592
    - -0.15976057
    - -0.76166065
    - 0.18787272
    - 1.7980539
    - 0.81746185
  use_demo_reset: false
  joint_controller_cfg: joint-position-controller.yml

paths:
  data_dir: data
  checkpoint_dir: checkpoints
  log_dir: logs
  output_dir: outputs
  # Current SFT training / collection data (122+ episodes)
  sft_episodes_dir: rlt_project/rlt_reproduce/data/sft/plug_insertion
  export_dir: data/export_for_gpu
  # Legacy critical-phase demos (101 eps, no longer used for reset or training)
  legacy_demo_reset_json: rlt_project/rlt_reproduce/data/legacy_critical_demo_json_101eps
  legacy_episodes_npz: rlt_project/rlt_reproduce/data/episodes/legacy_critical_npz_101eps

device: cpu
