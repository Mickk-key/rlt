# GPU host (fvl08 / 10.176.53.120): rl_server only.
# Robot PC uses configs/plug_insertion.yaml for actor_loop.

robot:
  backend: deoxys
  control_hz: 20
  proprio_dim: 8

cameras:
  image_size: [224, 224]

vla:
  checkpoint: checkpoints/pi05_plug_insertion/plug_insertion_112ep_success_8gpu/5000
  config_name: pi05_plug_insertion
  asset_id: local/plug_insertion_112ep_success
  input_format: libero
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

rl_token:
  embed_dim: 2048
  token_dim: 2048
  num_encoder_layers: 2
  num_decoder_layers: 2
  num_heads: 8
  ff_dim: 4096
  dropout: 0.0

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  discount: 0.99
  warmup_steps: 500
  update_to_data_ratio: 5
  critic_updates_per_actor: 2
  batch_size: 256
  replay_capacity: 100000
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  policy_constraint_beta: 1.0
  reference_dropout: 0.5
  action_noise_std: 0.05
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  critic_ensemble: 2
  target_update_tau: 0.005
  # Global physical delta-action box (RLT App. C "action-space bounding box"): the
  # actor mean is tanh-bounded to ±action_box and sampled/target actions are clamped
  # to it, so training and deployment share one in-distribution action set (TD3
  # stability). This box is the VALID ROBOT ACTION DOMAIN and is INDEPENDENT of the
  # VLA reference — locality toward the VLA is the SEPARATE soft BC term
  # (policy_constraint_beta·‖a−ref‖²). Units: [x,y,z (m), rx,ry,rz (rad), gripper].
  # Matches the Deoxys per-step safety clamp (0.02 m / 0.10 rad).
  action_box: [0.02, 0.02, 0.02, 0.10, 0.10, 0.10, 1.0]
  target_policy_noise: 0.2   # TD3 target-smoothing std, as a fraction of action_box
  target_noise_clip: 0.5     # TD3 target-smoothing clip, as a fraction of action_box
  grad_clip_norm: 10.0       # max global grad norm for actor & critic (defense-in-depth)
  checkpoint_save_interval_updates: 50
  checkpoint_keep_last: 5
  checkpoint_save_on_shutdown: true

inference:
  # FIRST FRESH RUN: forced "reference" — execution stays VLA reference REGARDLESS of
  # buffer count, so policy never runs on unvalidated warmup data. Only after data-QA
  # (>=500 valid chunk transitions AND >=2-3 successful reference episodes AND verified
  # shapes/rewards/done) switch this to "auto" and RESTART rl_server. Restart resets the
  # in-memory replay buffer to 0, so "auto" then re-warms 500 reference transitions and
  # the ramp cleanly goes alpha 0 -> 1 over the next 500 (warmup_steps/ramp_steps below).
  #
  # "auto" = paper-faithful warmup-gated execution (Algorithm 1 line 9):
  #   buffer_size < warmup_steps        -> execute VLA reference
  #   warmup <= buffer < warmup+ramp    -> linearly ramp reference -> anchored policy
  #   buffer_size >= warmup + ramp      -> execute anchored policy
  # Manual debug overrides: "reference" | "reference_noise" | "policy" (force actor).
  mode: reference
  ramp_steps: 500          # replay transitions over which alpha goes 0 -> 1 (0 = hard switch)
  reference_noise_std: 0.05

# DEPLOYMENT-ONLY reference-relative anchor (rl/inference_policy.py).
# NOTE: this is an ENGINEERING SAFETY LAYER for early robot validation and is NOT
# part of the core RLT paper algorithm. The paper enforces locality via the SOFT BC
# term (Eq. 5) + the global action box above, not a hard reference-relative clip.
# The learner does NOT use this anchor (training operates on globally-bounded absolute
# actions). Keep it enabled while validating the bounded actor; once the actor is
# verified stable, set enabled=false so the train and deploy action domains match
# (both = the global action_box). The Deoxys per-step safety clamp stays active either way.
policy_anchor:
  enabled: true            # engineering safety only; relax to false after actor is verified
  max_dev_trans_m: 0.01    # max per-step translation deviation from VLA reference (m)
  max_dev_rot_rad: 0.05    # max per-step axis-angle rotation deviation (rad)
  max_dev_grip: 1.0

paths:
  checkpoint_dir: checkpoints
  log_dir: logs

device: cuda
