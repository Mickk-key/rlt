# GPU host (fvl08 / 10.176.53.120): rl_server only.
# Robot PC uses configs/plug_insertion.yaml for actor_loop.

robot:
  backend: deoxys
  control_hz: 20
  proprio_dim: 8

cameras:
  image_size: [224, 224]

vla:
  checkpoint: checkpoints/pi05_plug_insertion/plug_insertion_112ep_success_8gpu/5000
  config_name: pi05_plug_insertion
  asset_id: local/plug_insertion_112ep_success
  input_format: libero
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

rl_token:
  embed_dim: 2048
  token_dim: 2048
  num_encoder_layers: 2
  num_decoder_layers: 2
  num_heads: 8
  ff_dim: 4096
  dropout: 0.0

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  discount: 0.99
  warmup_steps: 500
  update_to_data_ratio: 5
  critic_updates_per_actor: 2
  batch_size: 256
  replay_capacity: 100000
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  policy_constraint_beta: 1.0
  reference_dropout: 0.5
  action_noise_std: 0.05
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  critic_ensemble: 2
  target_update_tau: 0.005
  checkpoint_save_interval_updates: 50
  checkpoint_keep_last: 5
  checkpoint_save_on_shutdown: true

inference:
  # FIRST FRESH RUN: forced "reference" — execution stays VLA reference REGARDLESS of
  # buffer count, so policy never runs on unvalidated warmup data. Only after data-QA
  # (>=500 valid chunk transitions AND >=2-3 successful reference episodes AND verified
  # shapes/rewards/done) switch this to "auto" and RESTART rl_server. Restart resets the
  # in-memory replay buffer to 0, so "auto" then re-warms 500 reference transitions and
  # the ramp cleanly goes alpha 0 -> 1 over the next 500 (warmup_steps/ramp_steps below).
  #
  # "auto" = paper-faithful warmup-gated execution (Algorithm 1 line 9):
  #   buffer_size < warmup_steps        -> execute VLA reference
  #   warmup <= buffer < warmup+ramp    -> linearly ramp reference -> anchored policy
  #   buffer_size >= warmup + ramp      -> execute anchored policy
  # Manual debug overrides: "reference" | "reference_noise" | "policy" (force actor).
  mode: reference
  ramp_steps: 500          # replay transitions over which alpha goes 0 -> 1 (0 = hard switch)
  reference_noise_std: 0.05

# Paper-faithful deployment anchor (rl/inference_policy.py). The actor still outputs
# an ABSOLUTE chunk a~pi(a|x,ref) (Eq. 4, NOT a residual); at deployment we bound the
# deviation so the executed action stays a local edit of the VLA reference:
#   action = reference + clip(actor - reference, +/- delta)
policy_anchor:
  enabled: true
  max_dev_trans_m: 0.01    # max per-step translation deviation from VLA reference (m)
  max_dev_rot_rad: 0.05    # max per-step axis-angle rotation deviation (rad)
  max_dev_grip: 1.0

paths:
  checkpoint_dir: checkpoints
  log_dir: logs

device: cuda
