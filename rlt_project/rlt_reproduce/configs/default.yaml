# RLT reproduction defaults (aligned with paper Appendix B)
# Paper: https://www.pi.website/research/rlt

vla:
  # openpi checkpoint; download after GPU setup with scripts/download_checkpoint.sh
  checkpoint: null
  config_name: pi05_droid
  action_dim: 14
  vla_chunk_horizon: 50  # H in paper
  execute_prefix: 20

rl_token:
  embed_dim: 2048  # matches pi0.6 VLA final-layer token dim
  token_dim: 2048  # RL token z_rl dimension (1 x 2048 in Fig. 2)
  num_encoder_layers: 2
  num_decoder_layers: 2
  num_heads: 8
  ff_dim: 4096
  dropout: 0.0
  train_steps: 5000
  batch_size: 32
  lr: 1.0e-4
  vla_finetune_weight: 0.0  # alpha in Algorithm 1

online_rl:
  chunk_length: 10  # C in paper
  action_dim: 14
  control_hz: 50
  discount: 0.99
  warmup_steps: 500
  update_to_data_ratio: 5  # G in paper
  critic_updates_per_actor: 2
  batch_size: 256
  replay_capacity: 100000
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  policy_constraint_beta: 1.0  # beta in Eq. (5)
  reference_dropout: 0.5
  action_noise_std: 0.05
  subsample_stride: 2
  # actor/critic MLP: 2-layer x 256 (default tasks); screw task uses 3-layer x 512
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  critic_ensemble: 2
  target_update_tau: 0.005

paths:
  data_dir: data
  checkpoint_dir: checkpoints
  log_dir: logs
  output_dir: outputs

device: cpu  # switch to cuda after RTX 5090 + driver install
