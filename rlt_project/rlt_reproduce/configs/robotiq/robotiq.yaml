# Robotiq 2F gripper (Modbus RTU over USB-RS485 on PC)
# Used with FR3 arm via deoxys; gripper is independent of Franka Desk / FCI port 1338.

gripper_type: robotiq
serial_port: /dev/ttyUSB0
serial_port_by_id: /dev/serial/by-id/usb-FTDI_USB_TO_RS-485_DAANTKCW-if00-port0
baudrate: 115200
slave_id: 9
max_width: 0.085

rlinf_root: /home/host5010/workspaces/yjr/ConsVLA/RLinf
binary_open_threshold: 0.5
binary_close_threshold: -0.5
