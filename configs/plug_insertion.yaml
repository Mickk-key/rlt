# Plug insertion — robot PC overrides (GPU train yaml is source of truth for inference/RL).
# Online RL actor reads this file; GPU rl_server uses deploy-tree yaml (inference.mode there).

robot:
  backend: deoxys
  deoxys_root: third_party/deoxys
  deoxys_config: config/charmander.yml
  control_hz: 20
  action_scale: [0.05, 0.02, 1.0]
  proprio_dim: 8
  language: "plug the charger into the power socket"

gripper:
  type: franka
  config: configs/franka/franka_hand.yaml

cameras:
  backend: deoxys_realsense
  mapping:
    wrist: "215222079599"
    external: "254322072381"
  width: 640
  height: 480
  fps: 30
  image_size: [224, 224]

vla:
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  # Phase 4: subsampling stride for chunk-transition collection (RLT App. B uses 2).
  # Each episode stream produces transitions (x_s, a_{s:s+C}, ref_{s:s+C}, R, x_{s+C})
  # for s = 0, stride, 2*stride, ...  Set to chunk_length for non-overlapping chunks.
  subsample_stride: 2
  max_steps_per_episode: 200
  max_episodes: 50
  reset_mode: workspace
  # Use the same yaml as ``bash scripts/reset_to_init.sh`` for init-cube reset.
  reset_config: configs/sft_plug_insertion.yaml
  # external = subprocess reset_to_init.sh (release ZMQ, dedicated reset client)
  reset_method: external
  # After a success (s key), raise EE straight up this many meters (xy locked)
  # before归位 so the still-gripped plug leaves the socket vertically instead of
  # being dragged sideways by the xy-first reset. Set 0 to disable.
  success_lift_z_m: 0.06
  post_reset_wait_sec: 0.5
  # Match SFT: let OSC settle + drain stale RealSense frames before first VLA infer.
  post_reset_settle_sec: 1.0
  post_reset_warmup_steps: 25
  post_reset_max_pos_err_m: 0.03
  use_workspace_reset: true
  # GPU/VLA reference actions are physical EE deltas (m) — same as NPZ, not spacemouse units.
  action_is_physical: true
  # Optional human teleop intervention during rollout (RLT Sec. V), HG-DAgger style.
  # DISABLED by default; only activates if enabled AND a SpaceMouse opens. While the
  # operator pushes the puck past the deadzone, the teleop action overrides the
  # policy/reference action for that step (still passes the Phase-1 safety clamp) and
  # is stored as action=reference=teleop with an intervened flag. Reuses the SFT
  # SpaceMouse ids from data_collection unless overridden here. s/f/q are unchanged.
  teleop_intervention:
    enabled: false
    trans_deadzone: 0.15   # SpaceMouse translation magnitude (controller units) to engage
    rot_deadzone: 0.15     # SpaceMouse rotation magnitude (controller units) to engage
    # spacemouse_vendor_id: 9583
    # spacemouse_product_id: 50746

# Hard robot safety limits — applied to BOTH reference and policy modes in
# DeoxysEnv.step before FrankaInterface.control(). Bounds the physical per-step
# EE delta so the arm never receives an unconstrained actor command (RLT paper:
# action-space bounding). Values equal the DeoxysEnvConfig defaults, made explicit
# here so they are visible/tunable in the config the robot actually loads.
safety:
  enabled: true
  max_trans_delta_m: 0.02   # per-step Cartesian translation cap (m)
  max_rot_delta_rad: 0.1    # per-step axis-angle rotation cap (rad)
  gripper_min: -1.0
  gripper_max: 1.0

gpu_server:
  mock: false
  host: "10.176.53.120"
  port: 8765
  # First openpi VLA infer can be slow (CUDA warmup); default client wait is 180s.
  infer_timeout_sec: 180

# Same init-cube reset as SFT collection (configs/sft_plug_insertion.yaml).
sft_collection:
  fps: 50
  reset_pos_tol_m: 0.015
  joint_home_if_delta_above_m: 0.35
  approach_xy_first: true
  workspace_randomization:
    enabled: true
    bottom_center_xyz:
      - 0.6487597823143005
      - 0.008056552149355412
      - 0.20196470618247986
    reference_quat:
      - 0.014823771081864834
      - 0.9990329742431641
      - 0.013332861475646496
      - -0.03918664902448654
    gripper_width: 0.08
    xy_half_range_m: 0.05
    z_range_m: 0.0
    seed: null

data_collection:
  fps: 20
  phase: critical
  controller_type: OSC_POSE
  controller_cfg: configs/deoxys/osc-pose-controller.yml
  gripper_latch: true
  spacemouse_vendor_id: 9583
  spacemouse_product_id: 50746
  reset_joint_positions:
    - 0.05904578
    - 0.52446592
    - -0.15976057
    - -0.76166065
    - 0.18787272
    - 1.7980539
    - 0.81746185
  use_demo_reset: false
  joint_controller_cfg: joint-position-controller.yml

paths:
  data_dir: data
  checkpoint_dir: checkpoints
  log_dir: logs
  output_dir: outputs
  # Current SFT training / collection data (122+ episodes)
  sft_episodes_dir: rlt_project/rlt_reproduce/data/sft/plug_insertion
  export_dir: data/export_for_gpu
  # Legacy critical-phase demos (101 eps, no longer used for reset or training)
  legacy_demo_reset_json: rlt_project/rlt_reproduce/data/legacy_critical_demo_json_101eps
  legacy_episodes_npz: rlt_project/rlt_reproduce/data/episodes/legacy_critical_npz_101eps

device: cpu
