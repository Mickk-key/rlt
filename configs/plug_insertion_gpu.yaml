# GPU-side rl_server config for plug insertion online RL.
# Sync to GPU host; robot PC uses configs/plug_insertion.yaml for actor only.

robot:
  backend: deoxys
  control_hz: 20
  proprio_dim: 8

cameras:
  image_size: [224, 224]

vla:
  checkpoint: checkpoints/pi05_plug_insertion_sft
  config_name: pi05_droid
  asset_id: franka
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

rl_token:
  embed_dim: 2048
  token_dim: 2048
  num_encoder_layers: 2
  num_decoder_layers: 2
  num_heads: 8
  ff_dim: 4096
  dropout: 0.0

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  discount: 0.99
  warmup_steps: 500
  update_to_data_ratio: 5
  critic_updates_per_actor: 2
  batch_size: 256
  replay_capacity: 100000
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  policy_constraint_beta: 1.0
  reference_dropout: 0.5
  action_noise_std: 0.05
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  critic_ensemble: 2
  target_update_tau: 0.005
  checkpoint_save_interval_updates: 50
  checkpoint_keep_last: 5
  checkpoint_save_on_shutdown: true

inference:
  mode: reference
  reference_noise_std: 0.05

paths:
  checkpoint_dir: checkpoints
  log_dir: logs

device: cuda
