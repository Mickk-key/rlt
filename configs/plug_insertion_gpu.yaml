# GPU host (fvl08 / 10.176.53.120): rl_server only.
# Robot PC uses configs/plug_insertion.yaml for actor_loop.

robot:
  backend: deoxys
  control_hz: 20
  proprio_dim: 8

cameras:
  image_size: [224, 224]

vla:
  checkpoint: checkpoints/pi05_plug_insertion/plug_insertion_112ep_success_8gpu/5000
  config_name: pi05_plug_insertion
  asset_id: local/plug_insertion_112ep_success
  input_format: libero
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

rl_token:
  embed_dim: 2048
  token_dim: 2048
  num_encoder_layers: 2
  num_decoder_layers: 2
  num_heads: 8
  ff_dim: 4096
  dropout: 0.0

online_rl:
  chunk_length: 10
  action_dim: 7
  control_hz: 20
  discount: 0.99
  warmup_steps: 500
  update_to_data_ratio: 5
  critic_updates_per_actor: 2
  batch_size: 256
  replay_capacity: 100000
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4
  policy_constraint_beta: 1.0
  reference_dropout: 0.5
  action_noise_std: 0.05
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]
  critic_ensemble: 2
  target_update_tau: 0.005
  checkpoint_save_interval_updates: 50
  checkpoint_keep_last: 5
  checkpoint_save_on_shutdown: true

inference:
  # FIRST FRESH RUN: forced "reference" (execution stays VLA reference regardless of
  # buffer). After data-QA (>=500 valid chunk transitions AND >=2-3 successful reference
  # episodes AND verified shapes/rewards/done) switch to "auto" and RESTART rl_server.
  # NOTE: rl_server actually loads the tree-B config
  # (rlt_project/rlt_reproduce/configs/plug_insertion_gpu.yaml) via run_rl_server.sh;
  # this mirror is kept in parity to avoid drift.
  #
  # "auto" = warmup-gated: buffer<warmup -> reference; warmup..warmup+ramp -> ramp;
  #          >= warmup+ramp -> anchored policy.
  mode: reference
  ramp_steps: 500          # replay transitions over which alpha goes 0 -> 1 (0 = hard switch)
  reference_noise_std: 0.05

# Paper-faithful deployment anchor (rl/inference_policy.py): actor outputs an ABSOLUTE
# chunk a~pi(a|x,ref); at deployment the deviation is bounded to a local edit of the
# VLA reference: action = reference + clip(actor - reference, +/- delta).
policy_anchor:
  enabled: true
  max_dev_trans_m: 0.01    # max per-step translation deviation from VLA reference (m)
  max_dev_rot_rad: 0.05    # max per-step axis-angle rotation deviation (rad)
  max_dev_grip: 1.0

paths:
  checkpoint_dir: checkpoints
  log_dir: logs

device: cuda
