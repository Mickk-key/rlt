# SFT / imitation learning data collection — plug insertion (Franka + RealSense)
# JSONL + PNG output @ 50 Hz control with timestamp sync.
# See docs/SFT_DATA_COLLECTION.md

robot:
  backend: deoxys
  deoxys_config: config/charmander.yml
  deoxys_root: third_party/deoxys
  control_hz: 50
  action_scale: [0.05, 0.02, 1.0]
  proprio_dim: 8

gripper:
  type: franka
  config: configs/franka/franka_hand.yaml

cameras:
  backend: deoxys_realsense
  mapping:
    wrist: "215222079599"
    external: "254322072381"
  width: 640
  height: 480
  fps: 30
  image_size: [640, 480]

vla:
  checkpoint: checkpoints/pi05_base
  config_name: pi05_droid
  asset_id: franka
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: "plug the charger into the power socket"

data_collection:
  controller_type: OSC_POSE
  controller_cfg: configs/deoxys/osc-pose-controller.yml
  gripper_latch: true
  spacemouse_vendor_id: 9583
  spacemouse_product_id: 50746
  reset_joint_positions:
    - 0.05904578
    - 0.52446592
    - -0.15976057
    - -0.76166065
    - 0.18787272
    - 1.7980539
    - 0.81746185

sft_collection:
  fps: 50
  camera_fps: 30
  output_dir: data/sft/plug_insertion
  controller_type: OSC_POSE
  controller_cfg: osc-position-controller.yml
  gripper_latch: true
  max_sync_delta_ms: 30.0
  max_sync_retries: 8
  sync_retry_sleep_sec: 0.002
  post_reset_warmup_steps: 50
  reset_pos_tol_m: 0.015
  joint_home_if_delta_above_m: 0.35
  image_size: [640, 480]
  camera_front_key: external
  camera_wrist_key: wrist
  workspace_randomization:
    enabled: true
    # ⚠️ 必须先 record：遥操到插座正上方 → WRITE=1 bash scripts/record_bottom_center.sh
    # bottom_center = init 立方体底面中心；随机只在 xy±5cm、z 仅向上
    bottom_center_xyz: [0.677, -0.016, 0.189]  # REPLACE via record_bottom_center.sh
    reference_quat: [-0.012, 0.997, -0.059, 0.045]
    gripper_width: 0.0
    xy_half_range_m: 0.05
    z_range_m: 0.0
    # min_z_m: null  # 默认 = bottom_center z，reset 不会低于此高度
    seed: null
  approach_xy_first: true

paths:
  data_dir: data
  episodes_dir: data/episodes/plug_insertion
  sft_episodes_dir: data/sft/plug_insertion
  export_dir: data/export_for_gpu
  checkpoint_dir: checkpoints
  log_dir: logs

device: cuda
