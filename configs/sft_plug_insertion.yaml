robot:
  backend: deoxys
  deoxys_config: config/charmander.yml
  deoxys_root: third_party/deoxys
  control_hz: 50
  action_scale:
  - 0.05
  - 0.02
  - 1.0
  proprio_dim: 8
gripper:
  type: franka
  config: configs/franka/franka_hand.yaml
cameras:
  backend: deoxys_realsense
  mapping:
    wrist: '215222079599'
    external: '254322072381'
  width: 640
  height: 480
  fps: 30
  image_size:
  - 640
  - 480
vla:
  checkpoint: checkpoints/pi05_base
  config_name: pi05_droid
  asset_id: franka
  action_dim: 7
  vla_chunk_horizon: 15
  execute_prefix: 10
  language_instruction: plug the charger into the power socket
data_collection:
  controller_type: OSC_POSE
  controller_cfg: configs/deoxys/osc-pose-controller.yml
  gripper_latch: true
  spacemouse_vendor_id: 9583
  spacemouse_product_id: 50746
  reset_joint_positions:
  - 0.05904578
  - 0.52446592
  - -0.15976057
  - -0.76166065
  - 0.18787272
  - 1.7980539
  - 0.81746185
sft_collection:
  fps: 50
  camera_fps: 30
  output_dir: rlt_project/rlt_reproduce/data/sft/plug_insertion
  controller_type: OSC_POSE
  controller_cfg: osc-position-controller.yml
  gripper_latch: true
  max_sync_delta_ms: 30.0
  max_sync_retries: 8
  sync_retry_sleep_sec: 0.002
  post_reset_warmup_steps: 50
  reset_pos_tol_m: 0.015
  joint_home_if_delta_above_m: 0.35
  image_size:
  - 640
  - 480
  camera_front_key: external
  camera_wrist_key: wrist
  workspace_randomization:
    enabled: true
    bottom_center_xyz:
    - 0.650225818157196
    - 0.012409043498337269
    - 0.22133591771125793
    reference_quat:
    - 0.004031446762382984
    - 0.9997031092643738
    - -0.011517852544784546
    - -0.021090295165777206
    gripper_width: 0.040066517889499664
    xy_half_range_m: 0.05
    z_range_m: 0.0
    seed: null
  approach_xy_first: true
paths:
  data_dir: data
  episodes_dir: rlt_project/rlt_reproduce/data/episodes/legacy_critical_npz_101eps
  sft_episodes_dir: rlt_project/rlt_reproduce/data/sft/plug_insertion
  export_dir: data/export_for_gpu
  checkpoint_dir: checkpoints
  log_dir: logs
device: cuda
